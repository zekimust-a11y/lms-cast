<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Now Playing - Lyr</title>
    <style>
      /* Inline Google Fonts CSS so the receiver doesn't need fonts.googleapis.com.
         Some Cast devices/networks block googleapis but allow fonts.gstatic.com. */
      /* cyrillic-ext */
      @font-face {
        font-family: 'Raleway';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/raleway/v37/1Ptxg8zYS_SKggPN4iEgvnHyvveLxVs9pbCFPrEHJA.woff2) format('woff2');
        unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;
      }
      /* cyrillic */
      @font-face {
        font-family: 'Raleway';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/raleway/v37/1Ptxg8zYS_SKggPN4iEgvnHyvveLxVs9pbCMPrEHJA.woff2) format('woff2');
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;
      }
      /* vietnamese */
      @font-face {
        font-family: 'Raleway';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/raleway/v37/1Ptxg8zYS_SKggPN4iEgvnHyvveLxVs9pbCHPrEHJA.woff2) format('woff2');
        unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;
      }
      /* latin-ext */
      @font-face {
        font-family: 'Raleway';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/raleway/v37/1Ptxg8zYS_SKggPN4iEgvnHyvveLxVs9pbCGPrEHJA.woff2) format('woff2');
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      /* latin */
      @font-face {
        font-family: 'Raleway';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/raleway/v37/1Ptxg8zYS_SKggPN4iEgvnHyvveLxVs9pbCIPrE.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>
    <script>
      // Cache-bust the receiver URL (Chromecast can aggressively cache GitHub Pages)
      try {
        const hasV = /[?&]v=/.test(location.search);
        if (!hasV) {
          const sep = location.search ? '&' : '?';
          location.replace(location.pathname + location.search + sep + 'v=' + Date.now() + location.hash);
        }
      } catch (e) {
        // ignore
      }
    </script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        /* Match Lyriq web typography where possible */
        font-family: QobuzSans, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        overflow: hidden;
        background: #000;
        color: #fff;
      }

      .build-badge {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 9999;
        font-size: 12px;
        letter-spacing: 0.4px;
        color: rgba(255, 255, 255, 0.85);
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.18);
        padding: 6px 10px;
        border-radius: 999px;
        user-select: none;
        pointer-events: none;
        display: none;
      }

      /* Big, obvious, center-screen test badge to confirm correct receiver HTML */
      .build-badge-center {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        font-size: clamp(22px, 4vw, 54px);
        font-weight: 700;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.95);
        background: rgba(0, 0, 0, 0.65);
        border: 2px solid rgba(255, 255, 255, 0.25);
        padding: 18px 26px;
        border-radius: 18px;
        text-align: center;
        user-select: none;
        pointer-events: none;
        backdrop-filter: blur(10px);
        opacity: 1;
        transition: opacity 1.2s ease;
        display: none;
      }

      .build-badge-center.fade-out {
        opacity: 0;
      }

      body.debug .build-badge,
      body.debug .build-badge-center {
        display: block;
      }

      .background-layer {
        position: fixed;
        inset: 0;
        background-size: cover;
        /* Top-align so faces/heads don't get cropped off on TV overscan */
        background-position: center top;
        opacity: 0;
        transition: opacity 1.5s ease-in-out;
        will-change: opacity;
      }

      .background-layer.active {
        opacity: 1;
      }

      .background-layer.blurred {
        filter: blur(40px) brightness(0.35);
        transform: scale(1.08);
      }

      .background-overlay {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.15) 0%,
          rgba(0, 0, 0, 0.55) 55%,
          rgba(0, 0, 0, 0.9) 100%
        );
        z-index: 2;
      }

      .bottom-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 32px 60px 40px;
        display: flex;
        gap: 48px;
        align-items: flex-end;
        z-index: 10;
        opacity: 1;
        transition: opacity 0.3s ease;
      }

      .bottom-bar.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .artwork-container {
        width: 33vh;
        height: 33vh;
        max-width: 442px;
        flex-shrink: 0;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .artwork {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.6s ease;
      }

      .artwork.loaded {
        opacity: 1;
      }

      .info {
        flex: 1;
        min-width: 0;
      }

      .title {
        font-size: 2.184rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .artist-text {
        font-size: 1.3rem;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 16px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .progress-row {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .time {
        width: 70px;
        font-variant-numeric: tabular-nums;
        color: rgba(255, 255, 255, 0.75);
        display: inline-flex;
        align-items: center;
        line-height: 1;
        min-height: 1em;
      }

      .time.duration {
        justify-content: flex-end;
        text-align: right;
      }

      .progress-container {
        flex: 1;
        height: 3px;
        display: flex;
        align-items: center;
        position: relative;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #ffffff, rgba(255, 255, 255, 0.9));
        border-radius: 3px;
        transition: width 1s linear;
        width: 0%;
      }

      .not-playing-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        opacity: 1;
        transition: opacity 0.3s ease;
      }

      .not-playing-container.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .not-playing {
        text-align: center;
      }

      .not-playing h2 {
        /* Splash/title: make Lyriq much larger */
        font-size: 5.92rem; /* 26% smaller than 8rem */
        font-family: Raleway, QobuzSans, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 700;
        letter-spacing: -1px;
        margin-bottom: 12px;
      }

      .not-playing p {
        font-size: 1.2rem;
        color: rgba(255, 255, 255, 0.7);
      }

      #volume-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.8);
        /* Keep the overlay consistently narrow (avoid jumping between square/wide) */
        width: 180px;
        padding: 22px 26px;
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 20;
      }

      #volume-overlay.visible {
        opacity: 1;
      }

      .volume-icon {
        font-size: 3rem;
      }

      .volume-text {
        font-size: 4.5rem;
        font-weight: 200;
        width: 100%;
        text-align: center;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      #volume-overlay.muted .volume-text {
        font-size: 2.2rem;
        letter-spacing: 3px;
        font-weight: 600;
        color: #ff6666;
      }

      /* Cast devices often report ~960px CSS width on 1080p TVs; keep desktop layout for TV. */
      @media (max-width: 850px) {
        .bottom-bar {
          flex-direction: column;
          align-items: center;
        }

        .artwork-container {
          width: 55vw;
          height: 55vw;
        }

        .info {
          width: 100%;
        }

        .title {
          font-size: 1.68rem;
          text-align: center;
        }

        .artist-text {
          text-align: center;
        }

        .progress-row {
          flex-direction: column;
          gap: 10px;
        }

        .progress-container {
          width: 100%;
        }

        .time {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="build-badge" id="build-badge">Lyryq Receiver</div>
    <div class="build-badge-center" id="build-badge-center">Lyryq Receiver</div>
    <div id="bg-layer-0" class="background-layer active"></div>
    <div id="bg-layer-1" class="background-layer"></div>
    <div class="background-overlay"></div>

    <div class="not-playing-container" id="not-playing-container">
      <div class="not-playing">
        <h2 id="not-playing-title">Lyr</h2>
      </div>
    </div>

    <div class="bottom-bar hidden">
      <div class="artwork-container">
        <img id="album-art" class="artwork" alt="Album art" />
      </div>
      <div class="info">
        <h1 class="title"></h1>
        <p class="artist-text"></p>
        <div class="progress-row">
          <span class="time current">0:00</span>
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <span class="time duration">0:00</span>
        </div>
      </div>
    </div>

    <div id="volume-overlay">
      <div id="volume-icon" class="volume-icon">🔊</div>
      <div id="volume-value" class="volume-text">0</div>
    </div>

    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
      const CAST_NAMESPACE = 'urn:x-cast:com.zeki.rooncast';
      const context = cast.framework.CastReceiverContext.getInstance();
      const options = new cast.framework.CastReceiverOptions();
      options.disableIdleTimeout = true;
      
      // Prevent Chromecast/CAF from showing the default "media receiver" UI.
      // We are NOT casting audio/video; this receiver is display-only and driven by custom NOW_PLAYING messages.
      try {
        const playerManager = context.getPlayerManager();
        playerManager.setMessageInterceptor(
          cast.framework.messages.MessageType.LOAD,
          (loadRequestData) => {
            console.log('[Receiver] Ignoring MEDIA LOAD request');
            return null;
          }
        );
      } catch (e) {
        // ignore
      }
      context.addCustomMessageListener(CAST_NAMESPACE, (event) => handleMessage(event.data));
      
      // Listen for sender disconnect to stop timers
      context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, (event) => {
        console.log('Sender disconnected, stopping playback');
        stopPlayback();
      });
      
      context.start(options);

      const bgLayers = [
        document.getElementById('bg-layer-0'),
        document.getElementById('bg-layer-1')
      ];
      const titleEl = document.querySelector('.title');
      const artistEl = document.querySelector('.artist-text');
      const currentTimeEl = document.querySelector('.time.current');
      const durationEl = document.querySelector('.time.duration');
      const progressBar = document.getElementById('progress-bar');
      const albumArt = document.getElementById('album-art');
      const bottomBar = document.querySelector('.bottom-bar');
      const notPlayingContainer = document.getElementById('not-playing-container');
      const notPlayingTitle = document.getElementById('not-playing-title');
      // Subtitle removed; keep only the large "Lyriq" splash.
      const volumeOverlay = document.getElementById('volume-overlay');
      const volumeIcon = document.getElementById('volume-icon');
      const volumeValue = document.getElementById('volume-value');

      let lastTrackId = '';
      let lastAlbumImage = null;
      let lastAlbumBackground = null;
      let lastArtistImagesKey = '';
      let lastPayload = null;
      let tickTimer = null;
      let activeBackgroundLayer = 0;
      let lastVolume = null;
      let lastMute = null;
      let volumeTimer = null;
      let artistImages = [];
      let rotationTimer = null;
      let bgLoadInProgress = false;
      let bgCurrentLoad = null;
      let rotationIndex = 0;
      // Rotate artist backgrounds every 25 seconds (as requested).
      const BACKGROUND_ROTATION_MS = 25000;
      // Filter out low-res artist/fanart backgrounds (TV looks bad otherwise).
      // These thresholds are conservative: if we can't get a reasonably large image, we fall back to album art.
      const MIN_BG_WIDTH = 900;
      const MIN_BG_HEIGHT = 500;

      function isLikelyLowResUrl(url) {
        try {
          const u = String(url || '');
          // Common CDN sizing patterns we see (esp. thumbnails).
          if (/\b(80|96|120|128|160|200|240|256|300|320|400)x\1\b/i.test(u)) return true;
          if (/[?&](w|width)=(80|96|120|128|160|200|240|256|300|320|400)\b/i.test(u)) return true;
          if (/[?&](h|height)=(80|96|120|128|160|200|240|256|300|320|400)\b/i.test(u)) return true;
          return false;
        } catch {
          return false;
        }
      }

      function canonicalizeUrl(url) {
        try {
          const raw = String(url || '').trim();
          if (!raw) return '';
          // Only normalize absolute URLs; for anything else fallback to string cleanup.
          if (!/^https?:\/\//i.test(raw)) {
            return raw.replace(/[?&](v|t|ts|cacheBust|cb|rnd|_)=\d+/gi, '');
          }
          const u = new URL(raw);
          // Strip common cache-busters that can change frequently (causes rotation to reset).
          // NOTE: keep "_" because some CDNs use it for non-cache semantics.
          const strip = ['v', 't', 'ts', 'cacheBust', 'cb', 'rnd'];
          for (const k of strip) u.searchParams.delete(k);
          // Normalize param ordering to get stable comparisons.
          const entries = Array.from(u.searchParams.entries()).sort(([a], [b]) => a.localeCompare(b));
          u.search = entries.length ? `?${entries.map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&')}` : '';
          u.hash = '';
          return u.toString();
        } catch {
          return String(url || '').trim();
        }
      }

      function makeCanonicalListKey(list) {
        const arr = Array.isArray(list) ? list : [];
        const uniq = Array.from(
          new Set(
            arr
              .filter(Boolean)
              .map((u) => canonicalizeUrl(u))
              .filter(Boolean)
          )
        );
        uniq.sort();
        return uniq.join('|');
      }

      // Debug overlays only when explicitly requested
      try {
        const params = new URLSearchParams(location.search);
        const debug = params.get('debug') === '1';
        if (debug) document.body.classList.add('debug');
        const v = params.get('v') || 'no-v';
        const badge = document.getElementById('build-badge');
        if (badge) badge.textContent = `Lyryq Receiver v=${v}`;
        const badgeCenter = document.getElementById('build-badge-center');
        if (badgeCenter) {
          badgeCenter.textContent = `Lyryq Receiver\\nv=${v}`;
          setTimeout(() => badgeCenter.classList.add('fade-out'), 8000);
        }
      } catch (e) {
        // ignore
      }

      function handleMessage(data) {
        if (!data) return;
        if (data.type === 'NOW_PLAYING' || data.type === 'STATE') {
          applyNowPlaying(data.payload || {});
        } else if (data.type === 'PAUSE') {
          console.log('Received PAUSE command, resetting display');
          resetDisplay();
        } else if (data.type === 'VOLUME') {
          // Explicit volume update message (e.g., from Roon volume endpoint)
          try {
            const vol = data.payload?.output?.volume ?? data.payload?.volume ?? null;
            // IMPORTANT: For explicit VOLUME messages, show immediately even if this is the first
            // volume value we’ve seen (e.g., when LMS digital volume control is off and NOW_PLAYING
            // payloads do not include output.volume).
            handleVolumeOverlay(vol, { forceShow: true });
          } catch (e) {
            // ignore
          }
        }
      }

      function applyNowPlaying(payload) {
        const state = payload.state || 'idle';
        const isPlaying = state === 'playing';
        const isLoading = state === 'loading';
        const nowPlaying = payload.now_playing || null;

        // If paused, show the splash screen instead of a stale track.
        if (state === 'paused') {
          console.log('[Receiver] Paused, showing splash');
          resetDisplay();
          return;
        }

        // During loading/transitions, keep the last display
        if (isLoading && !nowPlaying && lastPayload) {
          return;
        }

        // If no nowPlaying but not explicitly idle/stopped/paused, keep last display (track change transition)
        if (!nowPlaying && state !== 'idle' && state !== 'stopped' && state !== 'paused' && lastPayload && lastPayload.now_playing) {
          console.log('[Receiver] Keeping last display during transition, state:', state);
          return;
        }

        lastPayload = payload;
        if (tickTimer) clearInterval(tickTimer);

        if (nowPlaying) {
          // Show the bottom bar when we have content
          bottomBar.classList.remove('hidden');
          if (notPlayingContainer) notPlayingContainer.classList.add('hidden');
          
          const trackId = `${nowPlaying.one_line?.line1 || ''}-${nowPlaying.two_line?.line1 || ''}`;
          let artistName = nowPlaying.two_line?.line2 || '';
          // If multiple artists separated by slashes, show only the primary artist
          if (artistName.includes(' / ')) {
            artistName = artistName.split(' / ')[0].trim();
          }
          const trackTitle = nowPlaying.two_line?.line1 || nowPlaying.one_line?.line1 || 'Unknown track';
          const duration = nowPlaying.length || 0;
          const seek = payload.seek_position || 0;
          const progress = duration > 0 ? (seek / duration) * 100 : 0;

          titleEl.textContent = trackTitle;
          artistEl.textContent = artistName;
          currentTimeEl.textContent = formatTime(seek);
          durationEl.textContent = formatTime(duration);
          updateProgress(progress);

          const albumImage = payload.image_data || null;
          const albumBackground = payload.image_url || albumImage;
          // Album art <img> should use whichever artwork URL we have (image_data or image_url).
          const albumArtSrc = albumImage || albumBackground || null;

          // IMPORTANT: payloads can arrive in stages (especially right after casting starts):
          // sometimes we get a NOW_PLAYING update without artist_images/artwork even though they
          // exist. Never "downgrade" the background (artist -> default) just because a later
          // payload omits these fields.
          const hasArtistImagesField = Array.isArray(payload.artist_images);
          const artistImageList = hasArtistImagesField ? payload.artist_images : null;
          const nextArtistImagesKey = hasArtistImagesField ? makeCanonicalListKey(artistImageList) : null;

          // If we've ever had artist images for the current track, DO NOT downgrade the background
          // just because later payloads omit artist_images or send an empty list.
          const hasNonEmptyArtistUpdate = hasArtistImagesField && Array.isArray(artistImageList) && artistImageList.length > 0;
          const keepExistingArtistImages =
            trackId === lastTrackId && lastArtistImagesKey && lastArtistImagesKey.length > 0 && !hasNonEmptyArtistUpdate;

          const artistImagesKey = keepExistingArtistImages
            ? lastArtistImagesKey
            : (nextArtistImagesKey === null ? lastArtistImagesKey : nextArtistImagesKey);
          const canonicalAlbumImage = albumImage ? canonicalizeUrl(albumImage) : null;
          const canonicalAlbumBackground = albumBackground ? canonicalizeUrl(albumBackground) : null;
          const artworkChanged =
            (canonicalAlbumImage && canonicalAlbumImage !== lastAlbumImage) ||
            (canonicalAlbumBackground && canonicalAlbumBackground !== lastAlbumBackground);
          const artistImagesChanged = artistImagesKey !== lastArtistImagesKey;

          // Update artwork/background not only on track change, but also when we receive a richer payload
          // for the same track (common right after casting starts).
          // Prevent a downgrade: if we already had artist images for this track, and the new payload
          // explicitly has none (or is missing the field), keep the existing rotation/background.
          const nextArtistListEmpty = hasArtistImagesField && (!artistImageList || artistImageList.length === 0);
          const wouldDowngradeArtistImages =
            trackId === lastTrackId && lastArtistImagesKey && lastArtistImagesKey.length > 0 && (nextArtistListEmpty || !hasArtistImagesField);

          const isNewTrack = trackId !== lastTrackId;
          if (isNewTrack || artworkChanged || (artistImagesChanged && !wouldDowngradeArtistImages)) {
            console.log('[Receiver] Track changed:', trackTitle);
            lastTrackId = trackId;
            lastAlbumImage = canonicalAlbumImage;
            lastAlbumBackground = canonicalAlbumBackground;
            lastArtistImagesKey = artistImagesKey;
            // Never show a "placeholder" by clearing album art on partial payloads.
            // Prefer keeping the previous image unless we have a new one (or track changed).
            if (albumArtSrc) {
              setAlbumArt(albumArtSrc);
            }
            // Only update background sources if we have a real list update, or if artwork changed.
            // This prevents switching to "no images" default during staged payloads.
            if (!wouldDowngradeArtistImages && !keepExistingArtistImages) {
              updateBackgroundSources(artistImageList || [], albumBackground);
            }
          }

          if (tickTimer) {
            clearInterval(tickTimer);
            tickTimer = null;
          }
          if (isPlaying) {
            tickTimer = setInterval(() => incrementSeek(), 1000);
          }
          // Show volume overlay when volume changes (same behavior as roon-cast receiver)
          handleVolumeOverlay(payload.output?.volume);
        } else if (state === 'idle' || state === 'stopped' || state === 'paused') {
          // Only reset display for explicit idle/stopped/paused states
          console.log('[Receiver] Resetting display, state:', state);
          resetDisplay();
        }
      }

      function incrementSeek() {
        if (!lastPayload || !lastPayload.now_playing) return;
        if (lastPayload.state && lastPayload.state !== 'playing') {
          return;
        }
        lastPayload.seek_position = (lastPayload.seek_position || 0) + 1;
        const total = lastPayload.now_playing.length || 0;
        const seek = lastPayload.seek_position;
        currentTimeEl.textContent = formatTime(seek);
        // Update progress to the NEXT second's position for smooth animation
        const nextProgress = total > 0 ? ((seek + 1) / total) * 100 : 0;
        updateProgress(nextProgress);
      }

      function handleVolumeOverlay(volumeObj, opts) {
        if (!volumeObj) return;
        const forceShow = !!(opts && opts.forceShow);
        const isMuted = !!volumeObj.is_muted;
        const value = typeof volumeObj.value === 'number' ? volumeObj.value : null;
        const min = typeof volumeObj.min === 'number' ? volumeObj.min : null;
        const max = typeof volumeObj.max === 'number' ? volumeObj.max : null;

        // Support both Roon dB (-80..0) and LMS percent (0..100) volume payloads.
        let percentage = null;
        const looksLikeDb =
          volumeObj.type === 'db' ||
          (typeof min === 'number' && min < 0) ||
          (typeof max === 'number' && max <= 0);

        if (value === null) return;

        if (looksLikeDb) {
          const dbMin = typeof min === 'number' ? min : -80;
          const dbMax = typeof max === 'number' ? max : 0;
          const range = dbMax - dbMin || 80;
          percentage = Math.max(0, Math.min(100, Math.round(((value - dbMin) / range) * 100)));
        } else {
          // Treat as linear percent (0..100), or scale from min/max if provided.
          if (typeof min === 'number' && typeof max === 'number' && max > min) {
            percentage = Math.max(0, Math.min(100, Math.round(((value - min) / (max - min)) * 100)));
          } else {
            percentage = Math.max(0, Math.min(100, Math.round(value)));
          }
        }
        
        // Only show overlay if volume actually changed (not on initial load), unless forceShow is requested.
        const volumeChanged = lastVolume !== null && (lastVolume !== percentage || lastMute !== isMuted);
        
        if (!forceShow && !volumeChanged && lastVolume === null) {
          // First load - just save the values without showing overlay
          lastVolume = percentage;
          lastMute = isMuted;
          return;
        }
        
        if (!forceShow && !volumeChanged) return;
        
        lastVolume = percentage;
        lastMute = isMuted;
        
        if (isMuted) {
          volumeIcon.textContent = '🔇';
          volumeValue.textContent = 'MUTED';
          volumeOverlay.classList.add('muted');
          volumeOverlay.classList.add('visible');
          clearTimeout(volumeTimer);
        } else {
          volumeIcon.textContent = percentage > 60 ? '🔊' : percentage > 0 ? '🔉' : '🔈';
          volumeValue.textContent = String(percentage);
          volumeOverlay.classList.remove('muted');
          volumeOverlay.classList.add('visible');
          clearTimeout(volumeTimer);
          volumeTimer = setTimeout(() => volumeOverlay.classList.remove('visible'), 2500);
        }
      }

      function setAlbumArt(imageUrl) {
        if (imageUrl) {
          const img = new Image();
          img.onload = () => {
            albumArt.src = imageUrl;
            albumArt.classList.add('loaded');
          };
          img.src = imageUrl;
        } else {
          albumArt.classList.remove('loaded');
          albumArt.removeAttribute('src');
        }
      }

      function updateBackgroundSources(artistList, albumImage) {
        if (rotationTimer) clearTimeout(rotationTimer);
        rotationTimer = null;
        rotationIndex = 0;
        // Pre-filter obvious thumbnail URLs. Anything borderline will be rejected after load by dimension checks.
        artistImages = Array.isArray(artistList)
          ? artistList
              .filter(Boolean)
              .map((u) => canonicalizeUrl(u))
              .filter((u) => !isLikelyLowResUrl(u))
          : [];
        console.log('[Receiver] updateBackgroundSources: got', artistImages.length, 'artist images');

        if (artistImages.length > 0) {
          console.log('[Receiver] Starting artist image rotation, images:', artistImages.length);
          // Start from a non-zero offset for variety (prevents always showing image #1 after reconnects).
          rotationIndex = Math.floor(Math.random() * artistImages.length);

          const scheduleNext = () => {
            if (rotationTimer) clearTimeout(rotationTimer);
            rotationTimer = setTimeout(() => showNext(), BACKGROUND_ROTATION_MS);
          };

          const showNext = () => {
            if (!artistImages.length) return;
            if (bgLoadInProgress) {
              // Don't pile up loads; retry on the next scheduled tick.
              return scheduleNext();
            }
            const url = artistImages[rotationIndex % artistImages.length];
            console.log('[Receiver] Showing artist image', (rotationIndex % artistImages.length) + 1, 'of', artistImages.length);
            rotationIndex = (rotationIndex + 1) % artistImages.length;
            setBackground(
              url,
              false,
              () => scheduleNext(),
              { minWidth: MIN_BG_WIDTH, minHeight: MIN_BG_HEIGHT, reason: 'artist-bg' },
              () => scheduleNext()
            );
          };

          // Show immediately, then schedule the next swap 25s after.
          showNext();
        } else if (albumImage) {
          console.log('[Receiver] No artist images, using blurred album art');
          setBackground(albumImage, true);
        } else {
          console.log('[Receiver] No images available, clearing background');
          clearBackground();
        }
      }

      function setBackground(url, blurred = false, onError, opts, onSuccess) {
        const minWidth = opts && typeof opts.minWidth === 'number' ? opts.minWidth : 0;
        const minHeight = opts && typeof opts.minHeight === 'number' ? opts.minHeight : 0;
        const reason = opts && typeof opts.reason === 'string' ? opts.reason : '';
        const target = bgLayers[activeBackgroundLayer === 0 ? 1 : 0];
        const other = bgLayers[activeBackgroundLayer];
        const img = new Image();
        bgLoadInProgress = true;
        // Drop references to any previous in-flight load so it can be GC'd.
        if (bgCurrentLoad) {
          try { bgCurrentLoad.onload = null; } catch {}
          try { bgCurrentLoad.onerror = null; } catch {}
        }
        bgCurrentLoad = img;
        const loadTimeout = setTimeout(() => {
          try {
            console.warn('[Receiver] Background image load timeout, skipping:', url);
          } catch {}
          bgLoadInProgress = false;
          if (typeof onError === 'function') onError();
        }, 12000);
        img.onload = () => {
          clearTimeout(loadTimeout);
          bgLoadInProgress = false;
          // Skip low-resolution backgrounds (primarily affects artist_images rotation).
          // For blurred album art we allow any size.
          if (!blurred && (img.naturalWidth < minWidth || img.naturalHeight < minHeight)) {
            // For artist backgrounds, allow smaller square portraits (e.g. 600x600) to keep rotation
            // from collapsing to a single image when only square sources (Deezer/iTunes) are available.
            // TVs will still look OK with a centered/zoomed 600px square; it's better than no rotation.
            const isSquareish = Math.abs(img.naturalWidth - img.naturalHeight) <= Math.max(40, Math.round(img.naturalWidth * 0.08));
            const squareOk = reason === 'artist-bg' && isSquareish && img.naturalWidth >= 600 && img.naturalHeight >= 600;
            if (squareOk) {
              // accept
            } else {
            console.warn(
              '[Receiver] Background image too small, skipping:',
              url,
              `(${img.naturalWidth}x${img.naturalHeight}, min ${minWidth}x${minHeight})`
            );
            if (typeof onError === 'function') onError();
            return;
            }
          }
          target.style.backgroundImage = `url('${url}')`;
          if (blurred) {
            target.classList.add('blurred');
          } else {
            target.classList.remove('blurred');
          }
          other.classList.remove('active');
          target.classList.add('active');
          activeBackgroundLayer = activeBackgroundLayer === 0 ? 1 : 0;
          if (typeof onSuccess === 'function') onSuccess();
        };
        img.onerror = () => {
          clearTimeout(loadTimeout);
          bgLoadInProgress = false;
          console.warn('[Receiver] Background image failed to load:', url);
          if (typeof onError === 'function') onError();
        };
        img.src = url;
      }

      function clearBackground() {
        bgLayers.forEach((layer) => {
          layer.style.backgroundImage = 'none';
          layer.classList.remove('active');
        });
      }

      function updateProgress(progress) {
        progressBar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
      }

      function formatTime(seconds) {
        const safe = Math.max(0, Math.floor(seconds || 0));
        const mins = Math.floor(safe / 60)
          .toString()
          .padStart(1, '0');
        const secs = Math.floor(safe % 60)
          .toString()
          .padStart(2, '0');
        return `${mins}:${secs}`;
      }

      function resetDisplay() {
        // Hide the entire bottom bar for blank screen
        bottomBar.classList.add('hidden');

        if (notPlayingContainer) {
          notPlayingContainer.classList.remove('hidden');
          if (notPlayingTitle) notPlayingTitle.textContent = 'Lyryq';
        }
        
        titleEl.textContent = '';
        artistEl.textContent = '';
        currentTimeEl.textContent = '0:00';
        durationEl.textContent = '0:00';
        albumArt.classList.remove('loaded');
        albumArt.removeAttribute('src');
        updateBackgroundSources([], null);
        updateProgress(0);
        stopPlayback();
      }

      function stopPlayback() {
        if (tickTimer) {
          clearInterval(tickTimer);
          tickTimer = null;
        }
        if (rotationTimer) {
          clearTimeout(rotationTimer);
          rotationTimer = null;
        }
        lastPayload = null;
      }

      // NOTE: do not call context.start() twice (can cause odd CAF behavior / default UI)
    </script>
  </body>
</html>
